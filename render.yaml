# FuelGuard AI — Render Blueprint (backend API only)
# Frontend (Angular): deploy separately (Static Site / Vercel / Netlify).
#
# Dashboard must match this file when using Blueprint sync:
#   Environment: Docker | Root Directory: (empty) | Build Command: (empty) | Start Command: (empty)

services:
  - type: web
    name: fuelguard-ai
    runtime: docker
    plan: free
    region: frankfurt
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:$PORT
      - key: ConnectionStrings__FuelGuard
        sync: false
      - key: AI__ApiKey
        sync: false
      - key: Cors__AllowedOrigins
        sync: false
