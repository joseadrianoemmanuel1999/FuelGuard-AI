name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: .NET build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore FuelGuard.sln

      - name: Build
        run: dotnet build FuelGuard.sln --configuration Release --no-restore

  docker-api:
    name: Docker image (API)
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t fuelguard-api:ci .

      - name: Verify published DLL in image
        run: |
          docker run --rm fuelguard-api:ci ls -la FuelGuard.Api.dll

  frontend:
    name: Angular build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fuelguard-webclient
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: fuelguard-webclient/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (production)
        env:
          API_BASE_URL: ${{ vars.API_BASE_URL }}
        run: |
          if [ -n "$API_BASE_URL" ]; then
            node -e "
              const fs = require('fs');
              const p = 'src/environments/environment.prod.ts';
              let s = fs.readFileSync(p, 'utf8');
              s = s.replace(/apiBaseUrl:\s*'[^']*'/, \"apiBaseUrl: '\" + process.env.API_BASE_URL + \"'\");
              fs.writeFileSync(p, s);
            "
          fi
          npx ng build --configuration production
