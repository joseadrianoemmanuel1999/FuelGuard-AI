<div class="col-span-4 glass-panel rounded-lg p-stack-md relative overflow-hidden group">
  <img
    class="absolute inset-0 w-full h-full object-cover opacity-20 transition-transform duration-700 group-hover:scale-110"
    [alt]="imageAlt()"
    [src]="imageUrl()"
  />
  <div class="relative z-10 flex flex-col h-full">
    <h3 class="font-label-caps text-label-caps text-tertiary mb-stack-xs">{{ title() }}</h3>
    <p class="text-[11px] text-on-surface-variant leading-tight">{{ description() }}</p>
    <button
      type="button"
      class="mt-auto flex items-center gap-unit text-xs text-primary font-bold bg-transparent border-0 p-0 cursor-pointer"
    >
      <span class="material-symbols-outlined text-sm">map</span>
      View Live Map
    </button>
  </div>
</div>
