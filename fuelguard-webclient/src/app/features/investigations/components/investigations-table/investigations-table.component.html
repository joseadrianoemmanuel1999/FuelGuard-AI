<div class="bg-surface-container-low border border-outline-variant/30 rounded shadow-md overflow-hidden">
  <table class="w-full text-left font-data-tabular">
    <thead>
      <tr class="bg-surface-container-high text-on-surface-variant border-b border-outline-variant/30">
        <th class="px-stack-md py-stack-sm font-label-caps text-label-caps">Company</th>
        <th class="px-stack-md py-stack-sm font-label-caps text-label-caps">Risk Level</th>
        <th class="px-stack-md py-stack-sm font-label-caps text-label-caps">Confidence</th>
        <th class="px-stack-md py-stack-sm font-label-caps text-label-caps">Region</th>
        <th class="px-stack-md py-stack-sm font-label-caps text-label-caps">Status</th>
        <th class="px-stack-md py-stack-sm font-label-caps text-label-caps">Last Activity</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-outline-variant/10">
      @for (inv of investigations(); track inv.id) {
        <tr
          appInvestigationRow
          [investigation]="inv"
          [selected]="inv.id === selectedId()"
          (select)="select.emit($event)"
        ></tr>
      }
    </tbody>
  </table>
</div>
