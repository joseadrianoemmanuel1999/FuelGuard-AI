<section class="glass-panel glow-border rounded-xl flex flex-col h-64 overflow-hidden">
  <div
    class="bg-surface-container-high px-margin-mobile lg:px-margin-desktop py-2 border-b border-outline-variant/20 flex items-center justify-between"
  >
    <div class="flex items-center gap-3">
      <span class="material-symbols-outlined text-[18px] text-on-surface-variant">terminal</span>
      <span class="font-label-caps text-label-caps uppercase text-on-surface-variant"
        >System Intelligence Logs</span
      >
    </div>
    <div class="flex gap-1.5">
      <div class="w-3 h-3 rounded-full bg-outline-variant/30"></div>
      <div class="w-3 h-3 rounded-full bg-outline-variant/30"></div>
      <div class="w-3 h-3 rounded-full bg-outline-variant/30"></div>
    </div>
  </div>
  <div
    #logsScrollContainer
    class="flex-1 p-stack-md font-data-tabular text-data-tabular bg-surface-container-lowest overflow-y-auto space-y-1"
  >
    @for (log of logs(); track trackByLogEntry($index, log)) {
      <p class="text-on-surface-variant" animate.enter="fg-terminal-line-enter">
        <span class="text-primary/70">[{{ log.timestamp }}]</span>
        <span [ngClass]="logStageNgClassMap(log.stage)">&nbsp;[{{ log.stage }}]</span>
        {{ log.message }}
      </p>
    }
    <p class="text-primary animate-pulse">&gt; SYSTEM STANDBY _</p>
  </div>
</section>
