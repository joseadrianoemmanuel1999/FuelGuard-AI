<div class="glass-panel glow-border p-stack-lg rounded-xl flex flex-col" [@fadeInSummary]="revision()">
  <div class="flex items-center gap-3 mb-stack-md">
    <div class="w-10 h-10 rounded-lg bg-primary/10 border border-primary/20 flex items-center justify-center text-primary">
      <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">psychology</span>
    </div>
    <h3 class="font-headline-md text-[20px] font-bold">AI Investigation Summary</h3>
  </div>
  <div
    class="bg-surface-container-lowest/50 border border-outline-variant/20 p-stack-md rounded-lg mb-stack-lg italic leading-relaxed min-h-[5rem]"
    [attr.data-revision]="revision()"
  >
    <p class="text-on-surface/90">
      @for (token of investigation().summaryTokens; track $index) {
        <span
          [ngClass]="{
            'text-primary font-bold not-italic': token.tone === 'primary',
            'text-error font-bold not-italic': token.tone === 'error',
            'text-on-surface/90': token.tone === 'default'
          }"
          >{{ token.text }}</span
        >
      }
    </p>
  </div>
  <div class="flex-1">
    <h4 class="font-label-caps text-label-caps uppercase text-primary mb-stack-sm">Recommended Actions</h4>
    <ul class="space-y-3">
      @for (action of investigation().recommendedActions; track action.title) {
        <li
          class="flex items-center gap-3 p-3 bg-surface-container-high rounded border-l-4 hover:bg-surface-container-highest transition-colors cursor-pointer group"
          [ngClass]="{
            'border-error': action.accent === 'error',
            'border-tertiary': action.accent === 'tertiary',
            'border-primary': action.accent === 'primary'
          }"
        >
          <span
            class="material-symbols-outlined"
            [ngClass]="{
              'text-error': action.accent === 'error',
              'text-tertiary': action.accent === 'tertiary',
              'text-primary': action.accent === 'primary'
            }"
            >{{ action.materialIcon }}</span
          >
          <span class="font-body-md text-on-surface">{{ action.title }}</span>
          <span
            class="material-symbols-outlined ml-auto text-on-surface-variant group-hover:text-white transition-colors"
            >chevron_right</span
          >
        </li>
      }
    </ul>
  </div>
</div>
