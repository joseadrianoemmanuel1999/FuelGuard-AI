<div class="glass-panel glow-border p-stack-lg rounded-xl overflow-hidden flex flex-col justify-between">
  <h3 class="font-label-caps text-label-caps uppercase text-on-surface-variant mb-stack-lg">
    Real-time Data Pipeline
  </h3>
  <div class="flex flex-wrap lg:flex-nowrap items-center justify-between gap-4 relative py-8">
    <div
      class="absolute top-1/2 left-0 w-full h-[1px] bg-outline-variant/30 -translate-y-1/2 hidden lg:block"
    ></div>
    <div class="relative z-10 flex flex-col items-center gap-3">
      <div
        class="w-12 h-12 rounded-lg flex items-center justify-center transition-all duration-500"
        [ngClass]="
          activeStage() >= 0
            ? 'bg-surface-container-highest border border-tertiary/40 shadow-lg shadow-tertiary/10'
            : 'bg-surface-container-highest border border-outline-variant'
        "
      >
        <span class="material-symbols-outlined text-on-surface-variant">input</span>
      </div>
      <span class="font-label-caps text-[10px] uppercase text-on-surface-variant">Ingestion</span>
    </div>
    <span
      class="material-symbols-outlined hidden lg:block transition-colors duration-500"
      [ngClass]="activeStage() >= 1 ? 'text-tertiary' : 'text-outline-variant'"
      >chevron_right</span
    >
    <div class="relative z-10 flex flex-col items-center gap-3">
      <div
        class="w-12 h-12 rounded-lg flex items-center justify-center transition-all duration-500"
        [ngClass]="
          activeStage() >= 1
            ? 'bg-surface-container-highest border border-primary/40 shadow-lg shadow-primary/15'
            : 'bg-surface-container-highest border border-outline-variant'
        "
      >
        <span class="material-symbols-outlined text-on-surface-variant">layers</span>
      </div>
      <span class="font-label-caps text-[10px] uppercase text-on-surface-variant">Aggregation</span>
    </div>
    <span
      class="material-symbols-outlined hidden lg:block transition-colors duration-500"
      [ngClass]="activeStage() >= 2 ? 'text-primary' : 'text-outline-variant'"
      >chevron_right</span
    >
    <div class="relative z-10 flex flex-col items-center gap-3">
      <div
        class="flex items-center justify-center transition-all duration-500 rounded-xl"
        [ngClass]="
          activeStage() >= 2
            ? 'w-16 h-16 bg-primary/20 border-2 border-primary shadow-lg shadow-primary/30 animate-pulse-slow pipeline-node-glow'
            : 'w-12 h-12 bg-surface-container-highest border border-outline-variant'
        "
      >
        <span
          class="material-symbols-outlined text-primary"
          style="font-variation-settings: 'FILL' 1"
          [ngClass]="activeStage() >= 2 ? 'text-[32px]' : 'text-[24px] text-on-surface-variant'"
          >warning</span
        >
      </div>
      <span
        class="font-label-caps uppercase font-bold transition-colors duration-300"
        [ngClass]="activeStage() >= 2 ? 'text-label-caps text-primary' : 'text-[10px] text-on-surface-variant'"
        >Anomaly</span
      >
    </div>
    <span
      class="material-symbols-outlined hidden lg:block transition-colors duration-500"
      [ngClass]="activeStage() >= 3 ? 'text-error' : 'text-outline-variant'"
      >chevron_right</span
    >
    <div class="relative z-10 flex flex-col items-center gap-3">
      <div
        class="flex items-center justify-center transition-all duration-500 rounded-xl"
        [ngClass]="
          activeStage() >= 3
            ? 'w-16 h-16 bg-error/20 border-2 border-error shadow-lg shadow-error/30 animate-pulse-slow pipeline-node-glow'
            : 'w-12 h-12 bg-surface-container-highest border border-outline-variant'
        "
      >
        <span
          class="material-symbols-outlined text-error"
          style="font-variation-settings: 'FILL' 1"
          [ngClass]="activeStage() >= 3 ? 'text-[32px]' : 'text-[24px] text-on-surface-variant'"
          >analytics</span
        >
      </div>
      <span
        class="font-label-caps uppercase font-bold transition-colors duration-300"
        [ngClass]="activeStage() >= 3 ? 'text-label-caps text-error' : 'text-[10px] text-on-surface-variant'"
        >Risk Analysis</span
      >
    </div>
    <span
      class="material-symbols-outlined hidden lg:block transition-colors duration-500"
      [ngClass]="activeStage() >= 4 ? 'text-tertiary' : 'text-outline-variant'"
      >chevron_right</span
    >
    <div class="relative z-10 flex flex-col items-center gap-3">
      <div
        class="w-12 h-12 rounded-lg flex items-center justify-center transition-all duration-500"
        [ngClass]="
          activeStage() >= 4
            ? 'bg-error/15 border-2 border-error shadow-lg shadow-error/20'
            : 'bg-surface-container-highest border border-outline-variant'
        "
      >
        <span
          class="material-symbols-outlined"
          [ngClass]="activeStage() >= 4 ? 'text-error' : 'text-on-surface-variant'"
          >notifications_active</span
        >
      </div>
      <span
        class="font-label-caps uppercase transition-colors duration-300"
        [ngClass]="activeStage() >= 4 ? 'text-[10px] text-error font-bold' : 'text-[10px] text-on-surface-variant'"
        >Alert</span
      >
    </div>
  </div>
  <div class="mt-8 flex gap-4">
    <div class="flex-1 bg-surface-container-low border border-outline-variant/30 p-3 rounded-lg">
      <div class="flex justify-between items-center mb-1">
        <span class="font-label-caps text-[10px] text-on-surface-variant uppercase">Throughput</span>
        <span class="font-data-tabular text-tertiary">Normal</span>
      </div>
      <div class="h-1.5 bg-surface-container-highest rounded-full overflow-hidden">
        <div class="h-full bg-tertiary transition-all duration-700" [ngClass]="throughputWidthClass()"></div>
      </div>
    </div>
    <div class="flex-1 bg-surface-container-low border border-outline-variant/30 p-3 rounded-lg">
      <div class="flex justify-between items-center mb-1">
        <span class="font-label-caps text-[10px] text-on-surface-variant uppercase">CPU Load</span>
        <span class="font-data-tabular text-on-surface">{{ cpuLoadPercent() }}%</span>
      </div>
      <div class="h-1.5 bg-surface-container-highest rounded-full overflow-hidden">
        <div
          class="h-full bg-primary transition-all duration-700"
          [style.width.%]="cpuLoadPercent()"
        ></div>
      </div>
    </div>
  </div>
</div>
