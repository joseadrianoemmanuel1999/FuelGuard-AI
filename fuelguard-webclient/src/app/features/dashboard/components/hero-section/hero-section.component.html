<section class="text-center py-stack-lg relative">
  <div
    class="absolute inset-0 -z-10 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-primary/10 via-transparent to-transparent blur-3xl opacity-50"
  ></div>
  <h2 class="font-display-lg text-display-lg text-on-surface mb-stack-sm">
    Fuel Smuggling Detection System
  </h2>
  <p class="font-body-lg text-body-lg text-on-surface-variant max-w-2xl mx-auto mb-stack-lg">
    AI-powered anomaly detection and risk analysis for critical infrastructure. Precision monitoring
    across global pipeline networks.
  </p>
  <button
    type="button"
    class="bg-primary text-on-primary px-8 py-4 rounded-lg font-headline-md text-[18px] font-bold hover:brightness-110 transition-all shadow-xl shadow-primary/20 active:scale-95"
    (click)="runSimulation()"
  >
    Simulate Fuel Smuggling Scenario
  </button>
</section>
